<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cortes Maite - Reserva tu cita</title>
<style>
:root{--p:#c2185b;--bg:#fce4ec;--w:#fff;--s:#2e7d32;--e:#c62828;--g:#757575;--o:#f57f17}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:var(--bg);color:#222;padding-bottom:2rem}
header{background:var(--p);color:#fff;padding:1rem;position:sticky;top:0;z-index:100;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
h1{font-size:1.2rem}
.container{max-width:600px;margin:1rem auto;padding:0 1rem}
.cal-header{display:flex;justify-content:space-between;align-items:center;background:var(--p);color:#fff;padding:.8rem;border-radius:12px 12px 0 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:var(--w);padding:.8rem;border-radius:0 0 12px 12px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;cursor:pointer;transition:.2s;font-size:.9rem}
.day:hover{background:#f8bbd0}
.day.sel{background:var(--p);color:#fff;font-weight:700;transform:scale(1.05)}
.day.past,.day.off{color:#ccc;background:#f5f5f5;cursor:not-allowed}
.day.blk{background:#ffcdd2;color:var(--e);text-decoration:line-through;cursor:not-allowed}
.section{background:var(--w);padding:1rem;border-radius:12px;margin:1rem 0;box-shadow:0 2px 6px rgba(0,0,0,0.1);display:none}
.section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
.slot{padding:.8rem;text-align:center;border:2px solid #f8bbd0;border-radius:8px;cursor:pointer;font-weight:500;transition:.2s}
.slot:hover{border-color:var(--p);background:#f8bbd0}
.slot.sel{background:var(--p);color:#fff;border-color:var(--p)}
.slot.taken{background:#ffcdd2;color:var(--e);border-color:var(--e);text-decoration:line-through;cursor:not-allowed}
.slot.blk{background:#e0e0e0;color:#999;border-color:#bdbdbd;cursor:not-allowed}
input,select{width:100%;padding:.8rem;margin:.5rem 0;border:2px solid #e0e0e0;border-radius:8px;font-size:1rem}
button.btn{width:100%;padding:.9rem;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem}
button.btn:active{opacity:.85}
button.btn.small{padding:.5rem;font-size:.85rem;width:auto}
.admin-toggle{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:#fff;padding:.4rem .8rem;border-radius:15px;font-size:.8rem;margin-top:.5rem;cursor:pointer;display:none}
#admin{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--w);z-index:200;overflow-y:auto;padding:1rem}
.card{background:#f9f9f9;padding:.8rem;margin:.5rem 0;border-radius:8px;border-left:4px solid #ccc}
.card.conf{border-left-color:var(--s);background:#e8f5e9}
.card.rej{border-left-color:var(--e);background:#ffebee;opacity:.7}
.badge{display:inline-block;padding:.2rem .5rem;border-radius:10px;font-size:.7rem;font-weight:700}
.badge.pend{background:#fff3e0;color:var(--o)}
.badge.conf{background:#e8f5e9;color:var(--s)}
.badge.rej{background:#ffebee;color:var(--e)}
.act-row{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}
.act-btn{padding:.4rem .6rem;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:.8rem}
.act-btn.green{background:var(--s)}
.act-btn.red{background:var(--e)}
.act-btn.gray{background:var(--g)}
.act-btn.orange{background:var(--o)}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spinner{width:36px;height:36px;border:4px solid #f3f3f3;border-top:4px solid var(--p);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}.status-bar{position:fixed;bottom:.8rem;right:.8rem;background:#333;color:#fff;padding:.3rem .6rem;border-radius:12px;font-size:.75rem;z-index:1000}
.status-bar.ok{background:var(--s)}
.status-bar.err{background:var(--e)}
.status-bar.off{background:var(--o)}
.tab-nav{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab-nav button{flex:1;min-width:80px}
.block-item{background:#fff3e0;padding:.6rem;margin:.3rem 0;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="load-text">Cargando sistema...</div></div>
<div id="status-bar" class="status-bar off">⏳ Conectando...</div>

<header>
  <h1>💇‍♀️ Cortes Maite</h1>
  <button class="admin-toggle" id="admin-btn" onclick="toggleAdmin()"> Acceso Maite</button>
</header>

<div class="container">
  <div class="cal-header">
    <button onclick="changeMonth(-1)" style="background:none;border:none;color:#fff;font-size:1.4rem;">‹</button>
    <h3 id="month-year" style="margin:0;"></h3>
    <button onclick="changeMonth(1)" style="background:none;border:none;color:#fff;font-size:1.4rem;">›</button>
  </div>
  <div class="cal-grid" id="cal"></div>

  <div class="section" id="time-sec">
    <h2>🕐 Horarios para <span id="date-show"></span></h2>
    <div class="time-grid" id="time-grid"></div>
  </div>

  <div class="section" id="form-sec">
    <h2>✍️ Datos del cliente</h2>
    <input type="text" id="c-name" placeholder="Nombre completo" required>
    <input type="tel" id="c-phone" placeholder="Teléfono" required>
    <select id="c-svc"><option value="">Selecciona servicio...</option><option>Corte</option><option>Tinte</option><option>Decoloración</option><option>Peinado</option><option>Tratamiento</option><option>Otro</option></select>
    <button class="btn" onclick="book()">✅ Reservar Cita</button>
  </div>

  <div class="section" id="ok-sec">
    <h2 style="text-align:center;color:var(--s)">✅ ¡Solicitud Enviada!</h2>
    <p style="text-align:center;margin:.8rem 0">Maite recibirá tu reserva y te confirmará por WhatsApp.</p>
    <button class="btn" style="background:var(--g)" onclick="resetAll()">Nueva Reserva</button>
  </div>
</div>

<div id="admin">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <h2>⚙️ Panel Maite</h2>    <button onclick="toggleAdmin()" style="padding:.4rem .8rem;background:#eee;border:none;border-radius:4px">Cerrar</button>
  </div>
  <div id="login-box" style="text-align:center;padding:2rem 0">
    <p>Contraseña de admin</p>
    <input type="password" id="adm-pass" placeholder="Maite2026">
    <button class="btn" onclick="login()">Entrar</button>
  </div>
  <div id="adm-content" style="display:none">
    <div class="tab-nav">
      <button class="btn" style="background:#1976d2" onclick="showTab('citas')">📋 Citas</button>
      <button class="btn" style="background:var(--o)" onclick="showTab('blk')">🚫 Bloqueos</button>
      <button class="btn" style="background:var(--s)" onclick="refreshData()">🔄 Actualizar</button>
    </div>
    <div id="tab-citas"><h3>Citas Recientes</h3><div id="list-citas"></div></div>
    <div id="tab-blk" style="display:none">
      <h3>Bloquear Día Completo</h3>
      <input type="date" id="blk-date">
      <button class="btn" style="background:var(--e)" onclick="addBlockDay()">Bloquear Día</button>
      <h3 style="margin-top:1.5rem">Bloquear Hora Específica</h3>
      <input type="date" id="blk-hour-date" style="margin-top:.5rem">
      <select id="blk-hour"><option value="">Selecciona hora...</option></select>
      <button class="btn" style="background:var(--o);margin-top:.5rem" onclick="addBlockHour()">Bloquear Hora</button>
      <h3 style="margin-top:1.5rem">Bloqueos Activos</h3><div id="list-blk"></div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/TU_URL_AQUI/exec'; 

let citas=[], bloqs=[];
let mes=new Date().getMonth(), anio=new Date().getFullYear();
let selFecha=null, selHora=null;
const horas=['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'];
const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get('admin') === 'true';
if(isAdmin) document.getElementById('admin-btn').style.display = 'inline-block';

function setStatus(txt,cls){const b=document.getElementById('status-bar');b.textContent=txt;b.className='status-bar '+cls}

async function fetchData(){
  try{
    setStatus('🔄 Sincronizando...','');
    const [r1,r2]=await Promise.all([
      fetch(API_URL+'?action=getCitas'),
      fetch(API_URL+'?action=getBloqueos')
    ]);
    const d1=await r1.json(), d2=await r2.json();    citas=d1.citas||[]; 
    bloqs=d2.bloqueos||[];
    localStorage.setItem('cm_citas',JSON.stringify(citas));
    localStorage.setItem('cm_bloqs',JSON.stringify(bloqs));
    setStatus('✅ Conectado a la nube','ok');
  }catch(e){
    console.warn('Offline mode',e);
    citas=JSON.parse(localStorage.getItem('cm_citas')||'[]');
    bloqs=JSON.parse(localStorage.getItem('cm_bloqs')||'[]');
    setStatus('📡 Modo offline','off');
  }finally{
    document.getElementById('loading').style.display='none';
    renderCal();
    if(isAdmin) renderAdmin();
  }
}

// ✅ CORREGIDO: Ahora redibuja el calendario con los bloqueos actualizados
function renderCal(){
  document.getElementById('month-year').textContent=`${meses[mes]} ${anio}`;
  const g=document.getElementById('cal'); 
  if(!g) return;
  g.innerHTML='';
  const prim=new Date(anio,mes,1).getDay(), dias=new Date(anio,mes+1,0).getDate();
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  
  for(let i=0;i<prim;i++){const d=document.createElement('div');d.className='day off';g.appendChild(d)}
  
  for(let d=1;d<=dias;d++){
    const el=document.createElement('div'); el.className='day'; el.textContent=d;
    const ds=`${anio}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const obj=new Date(anio,mes,d);
    
    // ✅ Comparación flexible con == para evitar errores de formato de Google Sheets
    const diaBloqueado = bloqs.some(b => b.Fecha == ds && b.Tipo == 'dia');
    
    if(obj<hoy) el.classList.add('past');
    else if(diaBloqueado) el.classList.add('blk');
    else el.onclick=()=>pickDate(ds,el);
    
    if(selFecha==ds) el.classList.add('sel');
    g.appendChild(el);
  }
}

function changeMonth(d){mes+=d;if(mes>11){mes=0;anio++}if(mes<0){mes=11;anio--}renderCal()}

function pickDate(ds,el){
  selFecha=ds; selHora=null;
  document.querySelectorAll('#cal .day').forEach(x=>x.classList.remove('sel'));  el.classList.add('sel');
  document.getElementById('date-show').textContent=ds.split('-').reverse().join('/');
  document.getElementById('time-sec').classList.add('active');
  document.getElementById('form-sec').classList.remove('active');
  document.getElementById('ok-sec').classList.remove('active');
  renderTimes();
  document.getElementById('time-sec').scrollIntoView({behavior:'smooth'});
}

function renderTimes(){
  const g=document.getElementById('time-grid'); 
  if(!g) return;
  g.innerHTML='';
  
  const blkSelect = document.getElementById('blk-hour');
  if(blkSelect && blkSelect.options.length === 1) {
    horas.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h;
      opt.textContent = h;
      blkSelect.appendChild(opt);
    });
  }
  
  horas.forEach(h=>{
    const el=document.createElement('div'); el.className='slot'; el.textContent=h;
    const taken = citas.some(c => c.Fecha == selFecha && c.Hora == h && c.Estado != 'rechazado');
    const blocked = bloqs.some(b => b.Fecha == selFecha && b.Hora == h && b.Tipo == 'hora');
    const dayBlocked = bloqs.some(b => b.Fecha == selFecha && b.Tipo == 'dia');
    
    if(taken) el.classList.add('taken');
    else if(blocked || dayBlocked) el.classList.add('blk');
    else el.onclick=()=>pickTime(h,el);
    
    if(selHora==h) el.classList.add('sel');
    g.appendChild(el);
  });
}

function pickTime(h,el){
  selHora=h;
  document.querySelectorAll('.slot').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('form-sec').classList.add('active');
  document.getElementById('form-sec').scrollIntoView({behavior:'smooth'});
}

async function book(){
  const n=document.getElementById('c-name').value.trim();
  const p=document.getElementById('c-phone').value.trim();  const s=document.getElementById('c-svc').value;
  if(!n||!p||!s) return alert('Completa todos los campos');
  
  const taken = citas.some(c => c.Fecha == selFecha && c.Hora == selHora && c.Estado != 'rechazado');
  const blocked = bloqs.some(b => b.Fecha == selFecha && (b.Hora == selHora || b.Tipo == 'dia'));
  if(taken || blocked) return alert('❌ Este horario ya no está disponible');
  
  setStatus('⏳ Enviando...','');
  try{
    await fetch(API_URL, {
      method:'POST',
      body:new URLSearchParams({action:'addCita',nombre:n,telefono:p,servicio:s,fecha:selFecha,hora:selHora})
    });
    document.getElementById('form-sec').classList.remove('active');
    document.getElementById('ok-sec').classList.add('active');
    document.getElementById('c-name').value='';
    document.getElementById('c-phone').value='';
    document.getElementById('c-svc').value='';
    await fetchData();
    setStatus('✅ Cita registrada','ok');
  }catch(e){
    alert('Error de conexión. Intenta de nuevo.');
    setStatus('❌ Error','err');
  }
}

function resetAll(){
  selFecha=null; selHora=null;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  renderCal();
  window.scrollTo(0,0);
}

function toggleAdmin(){document.getElementById('admin').style.display='block'}
function login(){
  if(document.getElementById('adm-pass').value==='Maite2026'){
    document.getElementById('login-box').style.display='none';
    document.getElementById('adm-content').style.display='block';
    renderAdmin();
  } else alert('Contraseña incorrecta');
}

function showTab(t){
  document.getElementById('tab-citas').style.display=t=='citas'?'block':'none';
  document.getElementById('tab-blk').style.display=t=='blk'?'block':'none';
  if(t=='citas') renderAdmin();
  if(t=='blk') renderBlocks();
}

function renderAdmin(){  const l=document.getElementById('list-citas'); 
  if(!l) return;
  l.innerHTML='';
  const ord=[...citas].sort((a,b)=>new Date(b.Fecha+'T'+b.Hora)-new Date(a.Fecha+'T'+a.Hora));
  ord.forEach(c=>{
    const d=document.createElement('div');
    d.className=`card ${c.Estado=='confirmado'?'conf':c.Estado=='rechazado'?'rej':''}`;
    d.innerHTML=`<strong>${c.Nombre}</strong> (${c.Servicio})<br> ${c.Fecha} 🕐 ${c.Hora}<br>📞 ${c.Telefono}
      <div class="act-row">${c.Estado=='pendiente'?`<button class="act-btn green" onclick="upd('${c.ID}','confirmado')">✅ Confirmar</button><button class="act-btn red" onclick="upd('${c.ID}','rechazado')"> Rechazar</button>`:`<span class="badge ${c.Estado=='confirmado'?'conf':'rej'}">${c.Estado.toUpperCase()}</span>`}</div>`;
    l.appendChild(d);
  });
}

function renderBlocks(){
  const bl=document.getElementById('list-blk'); 
  if(!bl) return;
  bl.innerHTML='';
  if(bloqs.length===0){bl.innerHTML='<p style="color:#999;text-align:center;padding:1rem">Sin bloqueos</p>';return;}
  bloqs.forEach((b,i)=>{
    const d=document.createElement('div'); d.className='block-item';
    const tipo = b.Tipo=='dia'?'📅 Día completo':'🕐 Hora';
    const detalle = b.Tipo=='dia'?b.Fecha:`${b.Fecha} - ${b.Hora}`;
    d.innerHTML=`<span>${tipo}: ${detalle}</span><button class="act-btn red" onclick="delBlk(${i})">Eliminar</button>`;
    bl.appendChild(d);
  });
}

async function upd(id,est){
  try{
    setStatus(' Actualizando...','');
    await fetch(API_URL,{method:'POST',body:new URLSearchParams({action:'updateEstado',id:id,estado:est})});
    await fetchData(); 
    renderAdmin();
    setStatus('✅ Actualizado','ok');
  }catch(e){
    alert('Error al actualizar');
    setStatus('❌ Error','err');
  }
}

async function addBlockDay(){
  const d=document.getElementById('blk-date').value;
  if(!d) return alert('Selecciona una fecha');
  
  try{
    setStatus('⏳ Bloqueando...','');
    await fetch(API_URL,{method:'POST',body:new URLSearchParams({action:'addBloqueo',fecha:d,tipo:'dia',hora:''})});
    await fetchData(); // Actualiza datos
    renderBlocks();    // Actualiza lista admin
    renderCal();       // ✅ AHORA SÍ ACTUALIZA EL CALENDARIO    document.getElementById('blk-date').value='';
    setStatus('✅ Día bloqueado','ok');
  }catch(e){
    alert('Error al bloquear');
    setStatus('❌ Error','err');
  }
}

async function addBlockHour(){
  const d=document.getElementById('blk-hour-date').value;
  const h=document.getElementById('blk-hour').value;
  if(!d||!h) return alert('Selecciona fecha y hora');
  
  try{
    setStatus('⏳ Bloqueando...','');
    await fetch(API_URL,{method:'POST',body:new URLSearchParams({action:'addBloqueo',fecha:d,tipo:'hora',hora:h})});
    await fetchData();
    renderBlocks();
    renderCal();       // ✅ AHORA SÍ ACTUALIZA EL CALENDARIO
    document.getElementById('blk-hour-date').value='';
    document.getElementById('blk-hour').value='';
    setStatus('✅ Hora bloqueada','ok');
  }catch(e){
    alert('Error al bloquear');
    setStatus(' Error','err');
  }
}

async function delBlk(i){
  const b=bloqs[i];
  if(!confirm(`¿Desbloquear ${b.Tipo=='dia'?'el día':'la hora'} ${b.Fecha}${b.Hora?' - '+b.Hora:''}?`)) return;
  
  try{
    setStatus('⏳ Eliminando...','');
    await fetch(API_URL,{method:'POST',body:new URLSearchParams({action:'delBloqueo',fecha:b.Fecha,hora:b.Hora||'',tipo:b.Tipo})});
    await fetchData();
    renderBlocks();
    renderCal();       // ✅ AHORA SÍ ACTUALIZA EL CALENDARIO
    setStatus('✅ Desbloqueado','ok');
  }catch(e){
    bloqs.splice(i,1);
    localStorage.setItem('cm_bloqs',JSON.stringify(bloqs));
    renderBlocks();
    renderCal();
    setStatus('✅ Desbloqueado (local)','ok');
  }
}

function refreshData(){
  fetchData();  if(document.getElementById('tab-citas').style.display==='block') renderAdmin();
  if(document.getElementById('tab-blk').style.display==='block') renderBlocks();
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
        </html>
