<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortes Maite</title>
<style>
body{font-family:Arial,sans-serif;background:#fce4ec;margin:0;padding:20px}
h1{color:#c2185b;text-align:center}
.cal{background:#fff;max-width:400px;margin:20px auto;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.cal-h{background:#c2185b;color:#fff;padding:15px;text-align:center}
.cal-d{display:grid;grid-template-columns:repeat(7,1fr);background:#f5f5f5;padding:10px;font-weight:bold;font-size:12px;text-align:center}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:10px;background:#fff}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #ddd;border-radius:5px;cursor:pointer;font-size:14px}
.day:hover{background:#f8bbd0}
.day.sel{background:#c2185b;color:#fff}
.day.past{background:#f5f5f5;color:#ccc;cursor:not-allowed}
.btn{background:#c2185b;color:#fff;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;width:100%;margin:5px 0}
</style>
</head>
<body>

<h1>💇‍♀️ Cortes Maite</h1>

<div class="cal">
    <div class="cal-h" id="calHead"></div>
    <div class="cal-d">
        <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
    </div>
    <div class="cal-g" id="calGrid"></div>
</div>

<script>
let month = new Date().getMonth();
let year = new Date().getFullYear();
const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function render() {
    console.log('Renderizando calendario...');
    
    const grid = document.getElementById('calGrid');
    const head = document.getElementById('calHead');
    
    if (!grid || !head) {
        console.error('No se encontraron elementos!');
        return;
    }
    
    grid.innerHTML = '';
    head.textContent = months[month] + ' ' + year;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    console.log('Primer día:', firstDay, 'Días en mes:', daysInMonth);
    
    // Espacios vacíos
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day';
        empty.style.visibility = 'hidden';
        grid.appendChild(empty);
    }
    
    // Días del mes
    const today = new Date();
    today.setHours(0,0,0,0);
    
    for (let d = 1; d <= daysInMonth; d++) {
        const dateObj = new Date(year, month, d);
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.textContent = d;
        
        if (dateObj < today) {
            dayEl.classList.add('past');
        } else {
            dayEl.onclick = function() {
                alert('Fecha: ' + d + ' de ' + months[month]);
            };
        }
        
        grid.appendChild(dayEl);
    }
    
    console.log('Calendario renderizado correctamente');
}

// Ejecutar inmediatamente
render();
</script>

</body>
</html>
