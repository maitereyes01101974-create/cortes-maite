<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortes Maite - Reserva tu cita</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#fce4ec;padding-bottom:20px}
header{background:#c2185b;color:#fff;padding:15px;text-align:center}
h1{font-size:1.2rem}
.container{max-width:600px;margin:20px auto;padding:0 15px}
.cal{background:#fff;border-radius:10px;overflow:hidden;margin-bottom:20px}
.cal-h{background:#c2185b;color:#fff;padding:15px;text-align:center;display:flex;justify-content:space-between;align-items:center}
.cal-h button{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer}
.cal-d{display:grid;grid-template-columns:repeat(7,1fr);background:#f5f5f5;padding:10px;font-weight:bold;font-size:12px;text-align:center}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:15px}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #ddd;border-radius:5px;cursor:pointer;font-size:14px}
.day:hover:not(.past):not(.blk){background:#f8bbd0}
.day.sel{background:#c2185b;color:#fff}
.day.today{border:2px solid #ff6f00}
.day.past{background:#f5f5f5;color:#ccc;cursor:not-allowed}
.day.blk{background:#ffcdd2;color:#c62828;text-decoration:line-through;cursor:not-allowed}
.section{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;display:none}
.section.active{display:block}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.time{padding:10px;text-align:center;background:#fff;border:2px solid #f8bbd0;border-radius:8px;cursor:pointer}
.time:hover:not(.taken):not(.blk){background:#f8bbd0}
.time.sel{background:#c2185b;color:#fff;border-color:#c2185b}
.time.taken{background:#ffcdd2;color:#c62828;text-decoration:line-through;cursor:not-allowed}
.time.blk{background:#e0e0e0;color:#999;cursor:not-allowed}
input,select{width:100%;padding:10px;margin:5px 0;border:2px solid #e0e0e0;border-radius:8px}
.btn{width:100%;padding:12px;background:#c2185b;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:10px}
.admin-btn{position:fixed;top:10px;right:10px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:#fff;padding:5px 10px;border-radius:15px;font-size:12px;cursor:pointer}
#admin{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto;padding:15px}
.card{background:#f9f9f9;padding:10px;margin:10px 0;border-radius:8px;border-left:4px solid #f57f17}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#fff3e0;color:#f57f17}
</style>
</head>
<body>

<header>
    <h1>💇‍♀️ Cortes Maite</h1>
    <p>Reserva tu cita</p>
    <button class="admin-btn" id="adminBtn" onclick="showAdmin()" style="display:none">🔒 Admin</button>
</header>

<div class="container">
    <div class="cal">
        <div class="cal-h">            <button onclick="prevMonth()">‹</button>
            <h3 id="cal-h">Cargando...</h3>
            <button onclick="nextMonth()">›</button>
        </div>
        <div class="cal-d"><div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div></div>
        <div class="cal-g" id="cal-g"></div>
    </div>

    <div class="section" id="time-sec">
        <h2>🕐 Selecciona hora</h2>
        <p id="date-text" style="margin:10px 0;color:#c2185b;font-weight:bold"></p>
        <div class="time-grid" id="time-grid"></div>
    </div>

    <div class="section" id="form-sec">
        <h2>✍️ Tus datos</h2>
        <input type="text" id="name" placeholder="Nombre completo">
        <input type="tel" id="phone" placeholder="Teléfono">
        <select id="service">
            <option value="">Selecciona servicio...</option>
            <option>Corte</option>
            <option>Tinte</option>
            <option>Decoloración</option>
            <option>Peinado</option>
            <option>Otro</option>
        </select>
        <button class="btn" onclick="book()">✅ Reservar Cita</button>
    </div>

    <div class="section" id="ok-sec">
        <h2 style="text-align:center;color:#2e7d32">✅ ¡Reserva Enviada!</h2>
        <p style="text-align:center;margin:15px 0">Maite te contactará por WhatsApp</p>
        <button class="btn" style="background:#757575" onclick="reset()">Nueva Reserva</button>
    </div>
</div>

<div id="admin">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px">
        <h2>⚙️ Panel Admin</h2>
        <button onclick="closeAdmin()" style="padding:5px 10px;background:#ccc;border:none;border-radius:4px;cursor:pointer">Cerrar</button>
    </div>
    <input type="password" id="adminPass" placeholder="Contraseña: Maite2026" style="margin-bottom:10px">
    <button class="btn" onclick="login()">Entrar</button>
    <div id="adminContent" style="display:none;margin-top:15px">
        <h3>Citas</h3>
        <div id="apptList"></div>
        <h3 style="margin-top:15px">Bloquear</h3>
        <input type="date" id="blockDate">
        <button class="btn" onclick="blockDay()">Bloquear Día</button>
        <div id="blockList" style="margin-top:15px"></div>    </div>
</div>

<script>
// Datos
let month = new Date().getMonth();
let year = new Date().getFullYear();
let selDate = null;
let selTime = null;
let citas = JSON.parse(localStorage.getItem('cortes_citas')) || [];
let bloqueos = JSON.parse(localStorage.getItem('cortes_bloqueos')) || [];
const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const horas = ['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'];

// Verificar si es admin
if(window.location.search.includes('admin=true')){
    document.getElementById('adminBtn').style.display = 'block';
}

// Renderizar calendario
function renderCal(){
    const h = document.getElementById('cal-h');
    const g = document.getElementById('cal-g');
    if(!h || !g) return;
    
    h.textContent = meses[month] + ' ' + year;
    g.innerHTML = '';
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0,0,0,0);
    
    // Espacios vacíos
    for(let i=0; i<firstDay; i++){
        const e = document.createElement('div');
        e.className = 'day';
        e.style.visibility = 'hidden';
        g.appendChild(e);
    }
    
    // Días
    for(let d=1; d<=daysInMonth; d++){
        const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        const dateObj = new Date(year, month, d);
        
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.textContent = d;
                if(dateObj < today){
            dayEl.classList.add('past');
        } else if(bloqueos.some(b => b.date === dateStr && b.type === 'day')){
            dayEl.classList.add('blk');
        } else {
            dayEl.onclick = function(){ selectDate(dateStr); };
        }
        
        if(selDate === dateStr) dayEl.classList.add('sel');
        if(dateObj.getTime() === today.getTime()) dayEl.classList.add('today');
        
        g.appendChild(dayEl);
    }
}

function prevMonth(){
    month--;
    if(month < 0){ month = 11; year--; }
    renderCal();
}

function nextMonth(){
    month++;
    if(month > 11){ month = 0; year++; }
    renderCal();
}

function selectDate(ds){
    selDate = ds;
    selTime = null;
    renderCal();
    
    const parts = ds.split('-');
    document.getElementById('date-text').textContent = '📅 ' + parts[2] + ' de ' + meses[parseInt(parts[1])-1];
    
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('time-sec').classList.add('active');
    
    renderTimes();
}

function renderTimes(){
    const g = document.getElementById('time-grid');
    if(!g) return;
    g.innerHTML = '';
    
    horas.forEach(h => {
        const timeEl = document.createElement('div');
        timeEl.className = 'time';
        timeEl.textContent = h;        
        const isTaken = citas.some(c => c.date === selDate && c.time === h && c.status !== 'rejected');
        const isBlocked = bloqueos.some(b => b.date === selDate && b.time === h);
        const dayBlocked = bloqueos.some(b => b.date === selDate && b.type === 'day');
        
        if(isTaken || isBlocked || dayBlocked){
            timeEl.classList.add(isTaken ? 'taken' : 'blk');
        } else {
            timeEl.onclick = function(){ selectTime(h); };
        }
        
        if(selTime === h) timeEl.classList.add('sel');
        g.appendChild(timeEl);
    });
}

function selectTime(t){
    selTime = t;
    renderTimes();
    
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('form-sec').classList.add('active');
}

function book(){
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const service = document.getElementById('service').value;
    
    if(!name || !phone || !service){
        alert('Completa todos los campos');
        return;
    }
    
    citas.push({
        id: Date.now().toString(),
        name: name,
        phone: phone,
        service: service,
        date: selDate,
        time: selTime,
        status: 'pending'
    });
    
    localStorage.setItem('cortes_citas', JSON.stringify(citas));
    
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('ok-sec').classList.add('active');
    
    document.getElementById('name').value = '';    document.getElementById('phone').value = '';
    document.getElementById('service').value = '';
    
    renderCal();
}

function reset(){
    selDate = null;
    selTime = null;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    renderCal();
}

function showAdmin(){
    document.getElementById('admin').style.display = 'block';
}

function closeAdmin(){
    document.getElementById('admin').style.display = 'none';
}

function login(){
    if(document.getElementById('adminPass').value === 'Maite2026'){
        document.getElementById('adminContent').style.display = 'block';
        renderAdmin();
    } else {
        alert('Contraseña incorrecta');
    }
}

function renderAdmin(){
    const list = document.getElementById('apptList');
    list.innerHTML = '';
    
    if(citas.length === 0){
        list.innerHTML = '<p style="text-align:center;color:#999;padding:20px">Sin citas</p>';
        return;
    }
    
    citas.forEach(c => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<strong>' + c.name + '</strong> <span class="badge">' + c.status + '</span><br>📅 ' + c.date + ' 🕐 ' + c.time + ' | ✂️ ' + c.service + '<br>📞 ' + c.phone + '<div style="margin-top:10px"><button onclick="updateStatus(\'' + c.id + '\',\'confirmed\')" style="background:#2e7d32;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;margin-right:5px">✅</button><button onclick="updateStatus(\'' + c.id + '\',\'rejected\')" style="background:#c62828;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer">❌</button></div>';
        list.appendChild(card);
    });
    
    // Bloqueos
    const blkList = document.getElementById('blockList');
    blkList.innerHTML = '';
    bloqueos.forEach((b, i) => {        const div = document.createElement('div');
        div.className = 'card';
        div.style.borderLeftColor = '#c62828';
        div.innerHTML = '📅 ' + b.date + (b.time ? ' 🕐 ' + b.time : ' (día)') + ' <button onclick="unblock(' + i + ')" style="background:#2e7d32;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;margin-left:10px">Desbloquear</button>';
        blkList.appendChild(div);
    });
}

function updateStatus(id, status){
    const c = citas.find(x => x.id === id);
    if(c){
        c.status = status;
        localStorage.setItem('cortes_citas', JSON.stringify(citas));
        renderAdmin();
    }
}

function blockDay(){
    const date = document.getElementById('blockDate').value;
    if(!date){
        alert('Selecciona fecha');
        return;
    }
    
    bloqueos.push({date: date, type: 'day'});
    localStorage.setItem('cortes_bloqueos', JSON.stringify(bloqueos));
    renderAdmin();
    renderCal();
    document.getElementById('blockDate').value = '';
}

function unblock(i){
    bloqueos.splice(i, 1);
    localStorage.setItem('cortes_bloqueos', JSON.stringify(bloqueos));
    renderAdmin();
    renderCal();
}

// Iniciar
renderCal();
</script>

</body>
          </html>
